name: Windows Release Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: Attach artifacts to a GitHub release
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: Release tag to use when create_release is true, for example v0.1.0
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ELECTRON_DISABLE_SECURITY_WARNINGS: "true"

jobs:
  build:
    name: Build Windows artifacts
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release confidence checks
        run: npm run check:release

      - name: Build Windows installer and portable app
        run: npm run dist:win

      - name: Smoke test packaged app
        run: npm run smoke:packaged

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: grok-command-center-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            "tag=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } elseif ("${{ github.event.inputs.release_tag }}" -ne "") {
            "tag=${{ github.event.inputs.release_tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "tag=manual-${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Create GitHub release
        if: github.ref_type == 'tag' || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          draft: true
          prerelease: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
